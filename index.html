<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Modo 98</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#0f172a;
  color:white;
  padding-bottom:80px;
}
.card{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:15px;
}
button{
  padding:12px;
  border-radius:10px;
  border:none;
  margin:5px;
}
.green{background:#22c55e;}
.red{background:#ef4444;}
.blue{background:#38bdf8;}
</style>
</head>

<body>

<h1 style="padding:15px;">Modo 98</h1>

<div class="card">
<h2>Hoy</h2>
<label><input type="checkbox"> Caminar</label><br>
<label><input type="checkbox"> Entreno</label><br>
<label><input type="checkbox"> Proteína</label><br>
<label><input type="checkbox"> Verdura</label><br>
<label><input type="checkbox"> Alcohol OK</label><br>
<label><input type="checkbox"> Dormir</label>
</div>

<div class="card">
<h2>Alcohol</h2>
<p id="count">0 / 4</p>

<button onclick="add()">+ Vermut</button>
<button onclick="add()">+ Vino</button>
<button onclick="add()">+ Gin</button>

<br><br>
<button class="red" onclick="reset()">Reset</button>
</div>

<div class="card">
<h2>Coach</h2>
<p id="coach"></p>
</div>

<script>
let drinks = JSON.parse(localStorage.getItem("drinks")||"[]");

function add(){
  drinks.push(Date.now());
  save();
}

function reset(){
  drinks=[];
  save();
}

function save(){
  localStorage.setItem("drinks",JSON.stringify(drinks));
  render();
}

function render(){
  let d = drinks.length;
  document.getElementById("count").innerText = d + " / 4";

  let msg="";
  if(d<=2) msg="Vas bien.";
  else if(d<=4) msg="Cuidado, estás cerca.";
  else msg="Te estás pasando. Prioridad: bajar alcohol.";

  document.getElementById("coach").innerText=msg;
}

render();
</script>

</body>
</html>
